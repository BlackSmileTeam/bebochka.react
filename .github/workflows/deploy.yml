# Деплой SPA + nginx на VPS (:55502). /api и /uploads → host.docker.internal:55501 (контейнер API на хосте).
# Контейнер: --add-host=host.docker.internal:host-gateway. VITE_API_URL — секрет или https://bebochka.ru.

name: Deploy frontend to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: bebochka-frontend
  HOST_PORT: '55502'
  CONTAINER_PORT: '80'

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          set -e
          missing=0
          [ -z "${{ secrets.PROD_HOST }}" ] && echo "Missing PROD_HOST" && missing=1 || true
          [ -z "${{ secrets.PROD_USER }}" ] && echo "Missing PROD_USER" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ] && echo "Missing PROD_SSH_PRIVATE_KEY" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PORT }}" ] && echo "Missing PROD_SSH_PORT" && missing=1 || true
          [ "$missing" -ne 0 ] && exit 1
          echo "Secrets OK"

      - name: SSH preflight
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            echo "=== SSH preflight (frontend target) ==="
            echo "Docker: $(docker --version 2>/dev/null || echo not installed)"
            docker ps -a --format 'table {{.Names}}\t{{.Status}}' | head -15
            echo "=== OK ==="

  build:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve VITE_API_URL for build
        id: vite
        run: |
          V='${{ secrets.VITE_API_URL }}'
          if [ -z "$V" ]; then V='https://bebochka.ru'; fi
          echo "url=$V" >> "$GITHUB_OUTPUT"

      - name: Docker build (load + GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          build-args: |
            VITE_API_URL=${{ steps.vite.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-frontend
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

      - name: Job summary
        run: |
          {
            echo "## Frontend build"
            echo "- Image: \`${{ env.IMAGE_NAME }}:latest\`"
            echo "- Commit: \`${GITHUB_SHA::8}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-frontend
          path: .

      - name: Verify archive
        run: ls -lh ${{ env.IMAGE_NAME }}.tar.gz && test -f ${{ env.IMAGE_NAME }}.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "${{ env.IMAGE_NAME }}.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Load and run container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            echo "=== Load and run ==="
            docker load < /tmp/$IMAGE_NAME.tar.gz
            rm -f /tmp/$IMAGE_NAME.tar.gz
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm -f $IMAGE_NAME 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              $IMAGE_NAME:latest
            sleep 2
            docker ps --filter "name=$IMAGE_NAME"
            CODE=$(curl -sS -o /tmp/fe_index.html -w "%{http_code}" --max-time 10 "http://127.0.0.1:${HOST_PORT}/" || echo "000")
            echo "GET / HTTP $CODE"
            if [ "$CODE" = "200" ]; then head -c 120 /tmp/fe_index.html && echo " ... OK"; else echo "WARN: curl frontend root"; fi
            echo "=== Frontend deploy done (listen :${HOST_PORT}) ==="

      - name: Summary
        run: |
          echo "## Frontend deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Порт на хосте: **${{ env.HOST_PORT }}**" >> "$GITHUB_STEP_SUMMARY"
