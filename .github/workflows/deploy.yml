# Деплой SPA + nginx на VPS (:55502). VITE_API_URL — секрет или https://bebochka.ru при сборке.
# Nginx в образе проксирует /api на сервис backend:44315 (docker-compose на сервере).

name: Deploy frontend to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: bebochka-frontend
  HOST_PORT: '55502'
  CONTAINER_PORT: '80'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          set -e
          missing=0
          [ -z "${{ secrets.PROD_HOST }}" ] && echo "Missing PROD_HOST" && missing=1 || true
          [ -z "${{ secrets.PROD_USER }}" ] && echo "Missing PROD_USER" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ] && echo "Missing PROD_SSH_PRIVATE_KEY" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PORT }}" ] && echo "Missing PROD_SSH_PORT" && missing=1 || true
          [ "$missing" -ne 0 ] && exit 1
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null \
            || ssh-keyscan "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker buildx create --use 2>/dev/null || true
          VITE="${{ secrets.VITE_API_URL }}"
          if [ -z "$VITE" ]; then VITE="https://bebochka.ru"; fi
          docker buildx build \
            --build-arg VITE_API_URL="$VITE" \
            -t "$IMAGE_NAME:latest" \
            --platform linux/amd64 \
            --load \
            .

      - name: Save image
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-frontend
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-frontend
          path: .

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "${{ env.IMAGE_NAME }}.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Load and run container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            docker load < /tmp/$IMAGE_NAME.tar.gz
            rm -f /tmp/$IMAGE_NAME.tar.gz
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm -f $IMAGE_NAME 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              $IMAGE_NAME:latest
            sleep 2
            docker ps --filter "name=$IMAGE_NAME"
            curl -sf --max-time 10 "http://127.0.0.1:${HOST_PORT}/" | head -c 120 && echo " ... OK index" || echo "WARN: curl frontend root"
            echo "=== Frontend deploy done (listen :${HOST_PORT}) ==="
