# Деплой фронта на FirstVDS (PROD_*) и опционально на edge-VPS Selectel (EDGE_*).
# FirstVDS: /api → host.docker.internal:55501 (локальный API на том же сервере)
# Edge-VPS: /api → bebochka-backend:44315 (Docker-сеть bebochka-edge), /uploads → FirstVDS

name: Deploy frontend to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: bebochka-frontend
  HOST_PORT: '55502'
  CONTAINER_PORT: '80'

jobs:
  preflight-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PROD secrets
        run: |
          set -e
          missing=0
          [ -z "${{ secrets.PROD_HOST }}" ] && echo "Missing PROD_HOST" && missing=1 || true
          [ -z "${{ secrets.PROD_USER }}" ] && echo "Missing PROD_USER" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ] && echo "Missing PROD_SSH_PRIVATE_KEY" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PORT }}" ] && echo "Missing PROD_SSH_PORT" && missing=1 || true
          [ "$missing" -ne 0 ] && exit 1
          echo "PROD secrets OK"

      - name: SSH preflight (FirstVDS)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            echo "=== SSH preflight FirstVDS ==="
            echo "Docker: $(docker --version 2>/dev/null || echo not installed)"
            docker ps -a --format 'table {{.Names}}\t{{.Status}}' | head -15
            echo "=== OK ==="

  preflight-edge:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.edge.outputs.configured }}
    steps:
      - id: edge
        run: |
          if [ -n "${{ secrets.EDGE_PROD_HOST }}" ] && [ -n "${{ secrets.EDGE_SSH_PRIVATE_KEY }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Edge secrets found — will deploy to edge VPS"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Edge secrets missing — skip edge deploy"
          fi

      - name: SSH preflight (edge VPS)
        if: steps.edge.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EDGE_PROD_HOST }}
          port: ${{ secrets.EDGE_SSH_PORT || 22 }}
          username: ${{ secrets.EDGE_PROD_USER || 'deploy' }}
          key: ${{ secrets.EDGE_SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            echo "=== SSH preflight edge VPS ==="
            echo "Docker: $(docker --version 2>/dev/null || echo not installed)"
            docker ps -a --format 'table {{.Names}}\t{{.Status}}' | head -15
            echo "=== OK ==="

  build:
    needs: [preflight-prod]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve VITE_API_URL for build
        id: vite
        run: |
          V='${{ secrets.VITE_API_URL }}'
          echo "url=$V" >> "$GITHUB_OUTPUT"
          if [ -z "$V" ]; then
            echo "Same-origin build: VITE_API_URL empty — API via page origin + nginx /api"
          else
            echo "Custom VITE_API_URL=$V (override same-origin)"
          fi

      - name: Docker build (load + GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          build-args: |
            VITE_API_URL=${{ steps.vite.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-frontend
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

      - name: Job summary
        run: |
          {
            echo "## Frontend build"
            echo "- Image: \`${{ env.IMAGE_NAME }}:latest\`"
            echo "- VITE_API_URL: \`${{ steps.vite.outputs.url || '(empty — same origin)' }}\`"
            echo "- Commit: \`${GITHUB_SHA::8}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-frontend
          path: .

      - name: Verify archive
        run: ls -lh ${{ env.IMAGE_NAME }}.tar.gz && test -f ${{ env.IMAGE_NAME }}.tar.gz

      - name: Copy image to FirstVDS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "${{ env.IMAGE_NAME }}.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Load and run container (FirstVDS)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            echo "=== Load and run FirstVDS ==="
            docker load < /tmp/$IMAGE_NAME.tar.gz
            rm -f /tmp/$IMAGE_NAME.tar.gz
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm -f $IMAGE_NAME 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              $IMAGE_NAME:latest
            sleep 2
            docker ps --filter "name=$IMAGE_NAME"
            CODE=$(curl -sS -o /tmp/fe_index.html -w "%{http_code}" --max-time 10 "http://127.0.0.1:${HOST_PORT}/" || echo "000")
            echo "GET / HTTP $CODE"
            API_CODE=$(curl -sS -o /tmp/fe_health.json -w "%{http_code}" --max-time 20 "http://127.0.0.1:${HOST_PORT}/api/health" || echo "000")
            echo "GET /api/health HTTP $API_CODE"
            if [ "$API_CODE" = "200" ]; then head -c 200 /tmp/fe_health.json && echo; else echo "WARN: API via frontend proxy failed"; fi
            echo "=== FirstVDS deploy done (:${HOST_PORT}) ==="

      - name: Summary
        run: |
          echo "## FirstVDS deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Host: \`${{ secrets.PROD_HOST }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Port: **${{ env.HOST_PORT }}**" >> "$GITHUB_STEP_SUMMARY"

  deploy-edge:
    needs: [build, preflight-edge]
    if: needs.preflight-edge.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-frontend
          path: .

      - name: Verify archive
        run: ls -lh ${{ env.IMAGE_NAME }}.tar.gz && test -f nginx.edge.conf

      - name: Copy image and nginx config to edge VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EDGE_PROD_HOST }}
          username: ${{ secrets.EDGE_PROD_USER || 'deploy' }}
          key: ${{ secrets.EDGE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EDGE_SSH_PORT || 22 }}
          source: "${{ env.IMAGE_NAME }}.tar.gz,nginx.edge.conf"
          target: "/tmp"
          overwrite: true

      - name: Load and run container (edge VPS)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EDGE_PROD_HOST }}
          username: ${{ secrets.EDGE_PROD_USER || 'deploy' }}
          key: ${{ secrets.EDGE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EDGE_SSH_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            EDGE_NGINX_DIR="$HOME/bebochka-edge"
            EDGE_NETWORK="bebochka-edge"
            mkdir -p "$EDGE_NGINX_DIR"
            cp /tmp/nginx.edge.conf "$EDGE_NGINX_DIR/nginx.conf"
            chmod 644 "$EDGE_NGINX_DIR/nginx.conf"
            docker network create "$EDGE_NETWORK" 2>/dev/null || true
            echo "=== Load and run edge VPS ==="
            docker load < /tmp/$IMAGE_NAME.tar.gz
            rm -f /tmp/$IMAGE_NAME.tar.gz /tmp/nginx.edge.conf
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm -f $IMAGE_NAME 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              --network "$EDGE_NETWORK" \
              -v "$EDGE_NGINX_DIR/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              $IMAGE_NAME:latest
            sleep 2
            docker ps --filter "name=$IMAGE_NAME"
            CODE=$(curl -sS -o /tmp/fe_index.html -w "%{http_code}" --max-time 10 "http://127.0.0.1:${HOST_PORT}/welcome" || echo "000")
            echo "GET /welcome HTTP $CODE"
            API_CODE=$(curl -sS -o /tmp/fe_health.json -w "%{http_code}" --max-time 30 "http://127.0.0.1:${HOST_PORT}/api/health" || echo "000")
            echo "GET /api/health HTTP $API_CODE"
            if [ "$API_CODE" = "200" ]; then head -c 200 /tmp/fe_health.json && echo; else echo "WARN: API via local Selectel backend failed — deploy Bebochka.Api edge job first"; fi
            echo "=== Edge VPS deploy done (:${HOST_PORT}) ==="

      - name: Summary
        run: |
          echo "## Edge VPS deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Host: \`${{ secrets.EDGE_PROD_HOST }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Port: **${{ env.HOST_PORT }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: bebochka-backend:44315 (Docker network bebochka-edge), uploads: FirstVDS :55501" >> "$GITHUB_STEP_SUMMARY"
