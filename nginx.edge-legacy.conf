# Edge-VPS: фронт локально, API на FirstVDS (157.22.199.24:80).
# Монтируется в контейнер при деплое — см. deploy-edge job в deploy.yml

upstream bebochka_api_legacy {
    server 157.22.199.24:80;
    keepalive 8;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1024M;
    client_body_timeout 30s;
    client_header_timeout 15s;

    location /api/ {
        proxy_pass http://bebochka_api_legacy/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host bebochka.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ^~ /uploads/ {
        proxy_pass http://bebochka_api_legacy/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host bebochka.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /assets/ {
        gzip_static on;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
